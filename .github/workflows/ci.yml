name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository }}

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e packages/contracts
      - run: python -m pip install -e services/api[dev]
      - run: npm install
        working-directory: apps/web
      - run: make lint
      - run: make typecheck
      - run: make test

  build-and-push:
    runs-on: ubuntu-latest
    needs: [quality]
    if: github.ref == 'refs/heads/main'
    strategy:
      matrix:
        include:
          - name: api
            file: services/api/Dockerfile
          - name: worker
            file: workers/quantum-runner/Dockerfile
          - name: web
            file: apps/web/Dockerfile
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.file }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/qcp-${{ matrix.name }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/qcp-${{ matrix.name }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-images-pr:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: services/api/Dockerfile
          push: false
          tags: qcp-api:ci
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: workers/quantum-runner/Dockerfile
          push: false
          tags: qcp-worker:ci
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          push: false
          tags: qcp-web:ci

  security-and-sbom:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@0.30.0
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: '1'
      - uses: anchore/sbom-action@v0
        with:
          path: .
          output-file: sbom.spdx.json

  policy-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
        with:
          version: v3.14.4
      - name: Install conftest
        run: |
          set -euo pipefail
          CONFTEST_VERSION=0.56.0
          curl -fsSL --retry 3 --retry-delay 5 \
            "https://github.com/open-policy-agent/conftest/releases/download/v${CONFTEST_VERSION}/conftest_${CONFTEST_VERSION}_Linux_x86_64.tar.gz" \
            | tar -xz -C /tmp conftest
          sudo mv /tmp/conftest /usr/local/bin/conftest
      - name: Render Helm templates and run policy checks
        run: |
          helm template quantum-control-plane infra/helm/quantum-control-plane \
            > /tmp/rendered-manifests.yaml
          conftest test -p infra/policies /tmp/rendered-manifests.yaml
