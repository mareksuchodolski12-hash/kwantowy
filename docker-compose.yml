services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-quantum}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-quantum}
      POSTGRES_DB: ${POSTGRES_DB:-quantum_control_plane}
    ports: ["5432:5432"]
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-quantum}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: services/api/Dockerfile
    environment:
      QCP_DATABASE_URL: ${QCP_DATABASE_URL:-postgresql+asyncpg://quantum:quantum@postgres:5432/quantum_control_plane}
      QCP_REDIS_URL: ${QCP_REDIS_URL:-redis://redis:6379/0}
      QCP_ENVIRONMENT: ${QCP_ENVIRONMENT:-dev}
      QCP_LOG_LEVEL: ${QCP_LOG_LEVEL:-INFO}
      QCP_CORS_ORIGINS: ${QCP_CORS_ORIGINS:-http://localhost:3000}
      QCP_IBM_RUNTIME_ENABLED: ${QCP_IBM_RUNTIME_ENABLED:-false}
      QCP_IBM_RUNTIME_TOKEN: ${QCP_IBM_RUNTIME_TOKEN:-}
      QCP_IBM_RUNTIME_CHANNEL: ${QCP_IBM_RUNTIME_CHANNEL:-ibm_quantum}
      QCP_IBM_RUNTIME_INSTANCE: ${QCP_IBM_RUNTIME_INSTANCE:-}
      QCP_IBM_RUNTIME_BACKEND: ${QCP_IBM_RUNTIME_BACKEND:-ibmq_qasm_simulator}
      QCP_OTEL_EXPORTER_OTLP_ENDPOINT: ${QCP_OTEL_EXPORTER_OTLP_ENDPOINT:-}
      QCP_API_KEY: ${QCP_API_KEY:-qcp_dev_default_key}
    ports: ["8000:8000"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/healthz')\""]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

  worker:
    build:
      context: .
      dockerfile: workers/quantum-runner/Dockerfile
    environment:
      QCP_DATABASE_URL: ${QCP_DATABASE_URL:-postgresql+asyncpg://quantum:quantum@postgres:5432/quantum_control_plane}
      QCP_REDIS_URL: ${QCP_REDIS_URL:-redis://redis:6379/0}
      QCP_ENVIRONMENT: ${QCP_ENVIRONMENT:-dev}
      QCP_LOG_LEVEL: ${QCP_LOG_LEVEL:-INFO}
      QCP_IBM_RUNTIME_ENABLED: ${QCP_IBM_RUNTIME_ENABLED:-false}
      QCP_IBM_RUNTIME_TOKEN: ${QCP_IBM_RUNTIME_TOKEN:-}
      QCP_IBM_RUNTIME_CHANNEL: ${QCP_IBM_RUNTIME_CHANNEL:-ibm_quantum}
      QCP_IBM_RUNTIME_INSTANCE: ${QCP_IBM_RUNTIME_INSTANCE:-}
      QCP_IBM_RUNTIME_BACKEND: ${QCP_IBM_RUNTIME_BACKEND:-ibmq_qasm_simulator}
      QCP_STUCK_JOB_TIMEOUT_SECONDS: ${QCP_STUCK_JOB_TIMEOUT_SECONDS:-120}
    depends_on:
      api:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
      INTERNAL_API_URL: ${INTERNAL_API_URL:-http://api:8000}
      QCP_API_KEY: ${QCP_API_KEY:-qcp_dev_default_key}
    ports: ["3000:3000"]
    depends_on:
      api:
        condition: service_healthy

  prometheus:
    image: prom/prometheus:v2.54.1
    volumes:
      - ./infra/observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./infra/observability/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
    ports: ["9090:9090"]
    depends_on: [api]
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.3.1
    volumes:
      - ./infra/observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports: ["3001:3000"]
    restart: unless-stopped

  loki:
    image: grafana/loki:3.2.1
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - ./infra/observability/loki/loki-config.yml:/etc/loki/local-config.yaml:ro
    ports: ["3100:3100"]
    restart: unless-stopped

volumes:
  postgres_data:
