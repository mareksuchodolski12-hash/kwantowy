apiVersion: apps/v1
kind: Deployment
metadata:
  name: qcp-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: qcp-api
  template:
    metadata:
      labels:
        app: qcp-api
    spec:
      containers:
        - name: api
          image: {{ .Values.image.api.repository }}:{{ .Values.image.api.tag }}
          ports:
            - containerPort: 8000
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          env:
            - name: QCP_DATABASE_URL
              value: {{ .Values.env.databaseUrl | quote }}
            - name: QCP_REDIS_URL
              value: {{ .Values.env.redisUrl | quote }}
---
apiVersion: v1
kind: Service
metadata:
  name: qcp-api
spec:
  selector:
    app: qcp-api
  ports:
    - port: 8000
      targetPort: 8000
