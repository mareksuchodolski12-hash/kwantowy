apiVersion: apps/v1
kind: Deployment
metadata:
  name: qcp-api
  labels:
    app.kubernetes.io/name: qcp-api
    app.kubernetes.io/part-of: quantum-control-plane
spec:
  replicas: 1
  selector:
    matchLabels:
      app: qcp-api
  template:
    metadata:
      labels:
        app: qcp-api
        app.kubernetes.io/name: qcp-api
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: api
          image: {{ .Values.image.api | quote }}
          ports:
            - containerPort: 8000
          env:
            - name: QCP_DATABASE_URL
              value: {{ .Values.env.databaseUrl | quote }}
            - name: QCP_REDIS_URL
              value: {{ .Values.env.redisUrl | quote }}
          resources:
            requests:
              cpu: {{ .Values.resources.api.requests.cpu | quote }}
              memory: {{ .Values.resources.api.requests.memory | quote }}
            limits:
              cpu: {{ .Values.resources.api.limits.cpu | quote }}
              memory: {{ .Values.resources.api.limits.memory | quote }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: qcp-api
  labels:
    app.kubernetes.io/name: qcp-api
    app.kubernetes.io/part-of: quantum-control-plane
spec:
  selector:
    app: qcp-api
  ports:
    - port: 8000
      targetPort: 8000
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: qcp-api-config
  labels:
    app.kubernetes.io/name: qcp-api
    app.kubernetes.io/part-of: quantum-control-plane
data:
  QCP_ENVIRONMENT: "production"
  QCP_LOG_LEVEL: "INFO"
