{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: qcp-ingress
  labels:
    app.kubernetes.io/part-of: quantum-control-plane
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
spec:
  ingressClassName: {{ .Values.ingress.className | default "nginx" }}
  {{- if .Values.ingress.tls.enabled }}
  tls:
    - hosts:
        - {{ .Values.ingress.host }}
      secretName: {{ .Values.ingress.tls.secretName }}
  {{- end }}
  rules:
    - host: {{ .Values.ingress.host }}
      http:
        paths:
          - path: /v1
            pathType: Prefix
            backend:
              service:
                name: qcp-api
                port:
                  number: 8000
          - path: /healthz
            pathType: Exact
            backend:
              service:
                name: qcp-api
                port:
                  number: 8000
          - path: /readyz
            pathType: Exact
            backend:
              service:
                name: qcp-api
                port:
                  number: 8000
          - path: /metrics
            pathType: Exact
            backend:
              service:
                name: qcp-api
                port:
                  number: 8000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: qcp-web
                port:
                  number: 3000
{{- end }}
