apiVersion: apps/v1
kind: Deployment
metadata:
  name: qcp-web
spec:
  replicas: 1
  selector:
    matchLabels:
      app: qcp-web
  template:
    metadata:
      labels:
        app: qcp-web
    spec:
      containers:
        - name: web
          image: {{ .Values.image.web | quote }}
          ports:
            - containerPort: 3000
          resources:
            requests:
              cpu: {{ .Values.resources.web.requests.cpu | quote }}
              memory: {{ .Values.resources.web.requests.memory | quote }}
            limits:
              cpu: {{ .Values.resources.web.limits.cpu | quote }}
              memory: {{ .Values.resources.web.limits.memory | quote }}
---
apiVersion: v1
kind: Service
metadata:
  name: qcp-web
spec:
  selector:
    app: qcp-web
  ports:
    - port: 3000
      targetPort: 3000
