apiVersion: apps/v1
kind: Deployment
metadata:
  name: qcp-web
  labels:
    app.kubernetes.io/name: qcp-web
    app.kubernetes.io/part-of: quantum-control-plane
spec:
  replicas: 1
  selector:
    matchLabels:
      app: qcp-web
  template:
    metadata:
      labels:
        app: qcp-web
        app.kubernetes.io/name: qcp-web
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: web
          image: {{ .Values.image.web | quote }}
          ports:
            - containerPort: 3000
          resources:
            requests:
              cpu: {{ .Values.resources.web.requests.cpu | quote }}
              memory: {{ .Values.resources.web.requests.memory | quote }}
            limits:
              cpu: {{ .Values.resources.web.limits.cpu | quote }}
              memory: {{ .Values.resources.web.limits.memory | quote }}
          securityContext:
            allowPrivilegeEscalation: false
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: qcp-web
  labels:
    app.kubernetes.io/name: qcp-web
    app.kubernetes.io/part-of: quantum-control-plane
spec:
  selector:
    app: qcp-web
  ports:
    - port: 3000
      targetPort: 3000
