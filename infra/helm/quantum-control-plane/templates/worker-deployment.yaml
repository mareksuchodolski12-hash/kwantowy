apiVersion: apps/v1
kind: Deployment
metadata:
  name: qcp-worker
  labels:
    app.kubernetes.io/name: qcp-worker
    app.kubernetes.io/part-of: quantum-control-plane
spec:
  replicas: {{ .Values.replicas.worker | default 1 }}
  selector:
    matchLabels:
      app: qcp-worker
  template:
    metadata:
      labels:
        app: qcp-worker
        app.kubernetes.io/name: qcp-worker
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: worker
          image: {{ .Values.image.worker | quote }}
          env:
            - name: QCP_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: qcp-secrets
                  key: database-url
            - name: QCP_REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: qcp-secrets
                  key: redis-url
          resources:
            requests:
              cpu: {{ .Values.resources.worker.requests.cpu | quote }}
              memory: {{ .Values.resources.worker.requests.memory | quote }}
            limits:
              cpu: {{ .Values.resources.worker.limits.cpu | quote }}
              memory: {{ .Values.resources.worker.limits.memory | quote }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
