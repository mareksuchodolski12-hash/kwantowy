image:
  api: ghcr.io/example/qcp-api:latest
  worker: ghcr.io/example/qcp-worker:latest
  web: ghcr.io/example/qcp-web:latest

env:
  # IMPORTANT: Override these values for every deployment.
  # Do NOT use the placeholder defaults in production — change both username and password.
  databaseUrl: "postgresql+asyncpg://quantum:CHANGEME@postgres:5432/quantum_control_plane"
  redisUrl: redis://redis:6379/0
  logLevel: INFO
  environment: production

ingress:
  enabled: false
  className: nginx
  host: qcp.example.com
  tls:
    enabled: false
    secretName: qcp-tls

replicas:
  api: 2
  worker: 1
  web: 1

resources:
  api:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"
  worker:
    requests:
      cpu: "200m"
      memory: "512Mi"
    limits:
      cpu: "1000m"
      memory: "1Gi"
  web:
    requests:
      cpu: "50m"
      memory: "128Mi"
    limits:
      cpu: "250m"
      memory: "256Mi"
