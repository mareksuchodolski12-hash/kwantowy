[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "quantum-control-plane-cli"
version = "0.1.0"
description = "CLI for the Quantum Control Plane"
requires-python = ">=3.11"
dependencies = [
  "httpx>=0.27.0",
  "click>=8.1.0",
  "rich>=13.0.0",
  "quantum-control-plane-sdk",
]

[project.scripts]
qcp = "qcp_cli.main:cli"

[tool.setuptools.packages.find]
include = ["qcp_cli*"]

[tool.ruff]
line-length = 120
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "B", "UP"]
ignore = ["B008"]
